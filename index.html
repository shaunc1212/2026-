<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>美国之行 2026 行程</title>
  <meta name="description" content="2026 年 5 月 19 日至 6 月 10 日美国家庭行程交互系统">
  <style>
    :root {
      --ink: #18202a;
      --muted: #607080;
      --line: #d9e2ea;
      --paper: #f7fafc;
      --panel: #fff;
      --blue: #2864a6;
      --blue-dark: #173f69;
      --green: #2d7a5f;
      --rose: #bd5454;
      --purple: #725a9c;
      --shadow: 0 14px 34px rgba(22, 36, 54, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.55;
    }

    button, input { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 250, 252, .94);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      max-width: 1160px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    h1 {
      margin-bottom: 2px;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.12;
    }

    .brand p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .icon-button, .pill-button, .date-button, .activity-card, .nav-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }

    .icon-button:hover, .pill-button:hover, .date-button:hover, .activity-card:hover, .nav-button:hover {
      transform: translateY(-1px);
      border-color: #aec0d0;
      box-shadow: 0 8px 18px rgba(22, 36, 54, .09);
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .hero {
      min-height: 180px;
      display: flex;
      align-items: flex-end;
      color: #fff;
      background:
        linear-gradient(110deg, rgba(24, 32, 42, .86), rgba(24, 32, 42, .44)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80") center/cover;
    }

    .hero-inner {
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      padding: 40px 16px 26px;
    }

    .hero h2 {
      margin-bottom: 12px;
      font-size: clamp(30px, 6vw, 52px);
      line-height: 1;
    }

    .hero p {
      max-width: 730px;
      margin-bottom: 0;
      color: rgba(255, 255, 255, .92);
      font-size: clamp(15px, 2vw, 18px);
    }

    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 20px 16px 52px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 18px;
    }

    .search {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      background: #fff;
      color: var(--ink);
    }

    .pill-button {
      min-height: 48px;
      padding: 0 14px;
      font-weight: 800;
    }

    .layout {
      display: grid;
      gap: 14px;
    }

    .date-panel {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .date-item {
      display: grid;
    }

    .date-button {
      width: 100%;
      min-height: 88px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: start;
      gap: 3px;
      padding: 10px;
      text-align: center;
    }

    .date-button.active {
      border-color: var(--blue);
      background: #e8f2fd;
      box-shadow: inset 0 -4px 0 var(--blue);
    }

    .date-num {
      color: var(--blue-dark);
      font-size: 24px;
      font-weight: 900;
      line-height: 1.05;
    }

    .date-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .date-count {
      width: fit-content;
      min-width: 42px;
      margin: 3px auto 0;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef3f7;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .content-panel {
      min-width: 0;
    }

    .mobile-day {
      display: none;
    }

    .day-header, .info-box, .activity-card, .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .day-header {
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .day-header h3 {
      margin-bottom: 8px;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.08;
    }

    .day-header p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 17px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 12px 0 18px;
    }

    .info-box {
      min-height: 86px;
      padding: 13px;
    }

    .info-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .info-value {
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .activity-list {
      display: grid;
      gap: 10px;
    }

    .activity-card {
      width: 100%;
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 13px;
      align-items: center;
      padding: 13px 15px;
      text-align: left;
    }

    .activity-time {
      color: var(--blue-dark);
      font-weight: 850;
    }

    .activity-card h4 {
      margin-bottom: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .activity-card p {
      margin-bottom: 0;
      color: var(--muted);
    }

    .activity-type {
      padding: 6px 9px;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .activity-type.traffic { background: var(--blue); }
    .activity-type.food { background: var(--rose); }
    .activity-type.hotel { background: var(--purple); }

    .empty {
      padding: 20px;
      color: var(--muted);
    }

    dialog {
      width: min(700px, calc(100vw - 24px));
      border: 0;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 24px 70px rgba(11, 19, 30, .32);
    }

    dialog::backdrop {
      background: rgba(8, 14, 22, .54);
    }

    .modal-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 13px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .modal-head h3 {
      margin-bottom: 0;
      font-size: 27px;
      line-height: 1.15;
    }

    .modal-body {
      padding: 17px 18px 20px;
      background: #fff;
    }

    .modal-body p {
      font-size: 17px;
    }

    .detail-list {
      margin: 0;
      padding-left: 20px;
    }

    .detail-list li {
      margin: 8px 0;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .nav-button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      padding: 0 12px;
      color: var(--blue-dark);
      text-decoration: none;
      font-weight: 850;
    }

    .print-note {
      display: none;
    }

    @media (max-width: 860px) {
      .topbar-inner {
        align-items: center;
        padding-block: 8px;
      }

      .quick-actions {
        display: none;
      }

      .mark {
        width: 34px;
        height: 34px;
        font-size: 13px;
      }

      h1 {
        font-size: 19px;
      }

      .hero {
        display: none;
      }

      main {
        padding-top: 10px;
      }

      .toolbar {
        grid-template-columns: 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }

      .search, .pill-button {
        min-height: 40px;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .date-panel {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
      }

      .date-button {
        min-height: 56px;
        gap: 1px;
        padding: 6px 4px;
        border-radius: 7px;
      }

      .date-num {
        font-size: 18px;
      }

      .date-meta {
        font-size: 11px;
        line-height: 1.1;
      }

      .date-count {
        min-width: 32px;
        margin-top: 1px;
        padding: 1px 5px;
        font-size: 11px;
      }

      .content-panel {
        display: block;
      }

      .day-header {
        padding: 11px 12px;
        box-shadow: none;
      }

      .day-header h3 {
        margin-bottom: 4px;
        font-size: 20px;
      }

      .day-header p {
        font-size: 14px;
        line-height: 1.35;
      }

      .info-grid {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin: 8px 0;
      }

      .info-box {
        min-height: 0;
        padding: 8px 9px;
      }

      .info-label {
        margin-bottom: 1px;
        font-size: 11px;
      }

      .info-value {
        font-size: 13px;
        line-height: 1.3;
      }

      .activity-card {
        grid-template-columns: 70px 1fr auto;
        gap: 8px;
        padding: 9px 10px;
      }

      .activity-time {
        font-size: 13px;
      }

      .activity-card h4 {
        font-size: 16px;
      }

      .activity-type {
        width: fit-content;
        padding: 4px 7px;
        font-size: 12px;
      }
    }

    @media (max-width: 520px) {
      .brand p { display: none; }
      main { padding-inline: 10px; }
      .hero-inner { padding-inline: 12px; }
      .topbar-inner { padding-inline: 12px; }
      .date-panel { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }

    @media (max-width: 380px) {
      .date-panel { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .activity-card { grid-template-columns: 1fr auto; }
      .activity-time { grid-column: 1 / -1; }
    }

    @media print {
      .topbar, .toolbar, .date-panel, dialog { display: none !important; }
      .hero { background: none; color: #000; min-height: auto; }
      .layout { display: block; }
      .day-header, .activity-card, .info-box { box-shadow: none; break-inside: avoid; }
      .print-note { display: block; margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="mark">US</div>
        <div>
          <h1>美国之行 2026</h1>
          <p>5月19日 - 6月10日 家庭行程表</p>
        </div>
      </div>
      <div class="quick-actions">
        <button class="icon-button" id="mainDayBtn" title="跳到 5月25日" aria-label="跳到主要集合日">⌂</button>
        <button class="icon-button" id="printBtn" title="打印行程" aria-label="打印行程">⎙</button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h2>点日期，看每天安排</h2>
      <p>活动、城市介绍、酒店地址、开车时间和地图入口都放在一个页面里。手机上点日期后，行程会直接展开在日期下面。</p>
    </div>
  </section>

  <main>
    <p class="print-note">美国之行 2026 行程打印版</p>
    <div class="toolbar">
      <input class="search" id="searchInput" type="search" placeholder="搜索城市、活动、酒店，例如：达拉斯、尼加拉、毕业典礼">
      <button class="pill-button" id="clearBtn">显示全部日期</button>
    </div>

    <div class="layout">
      <nav class="date-panel" id="datePanel" aria-label="日期列表"></nav>
      <section class="content-panel" aria-live="polite">
        <div class="day-header" id="dayHeader"></div>
        <div class="info-grid" id="infoGrid"></div>
        <div class="activity-list" id="activityList"></div>
      </section>
    </div>
  </main>

  <dialog id="detailDialog">
    <article>
      <div class="modal-head">
        <div>
          <div class="info-label" id="modalMeta"></div>
          <h3 id="modalTitle"></h3>
        </div>
        <button class="icon-button" id="closeDialog" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <p id="modalIntro"></p>
        <ul class="detail-list" id="modalDetails"></ul>
        <div class="link-row" id="modalLinks"></div>
      </div>
    </article>
  </dialog>

  <dialog id="introDialog">
    <article>
      <div class="modal-head">
        <div>
          <div class="info-label" id="introMeta">AI 生成介绍</div>
          <h3 id="introTitle"></h3>
        </div>
        <button class="icon-button" id="closeIntro" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <p id="introText"></p>
        <ul class="detail-list" id="introTips"></ul>
      </div>
    </article>
  </dialog>

        `;
        button.addEventListener("click", () => {
          state.selectedId = dayItem.id;
          render();
        });
        wrapper.appendChild(button);

        datePanel.appendChild(wrapper);
      });

      if (!days.length) datePanel.innerHTML = `<div class="empty">没有找到相关日期，请换一个关键词。</div>`;
    }

    function renderDay() {
      const dayItem = trip.find(item => item.id === state.selectedId) || filteredTrip()[0];
      if (!dayItem) {
        dayHeader.innerHTML = `<h3>没有找到行程</h3><p>请清空搜索后再试。</p>`;
        infoGrid.innerHTML = "";
        activityList.innerHTML = "";
        return;
      }
      dayHeader.innerHTML = buildDayHeader(dayItem);
      infoGrid.innerHTML = buildInfoGrid(dayItem);
      activityList.innerHTML = "";
      dayItem.activities.forEach((item, index) => {
        const card = createActivityCard(item, index);
        card.addEventListener("click", () => openDetail(dayItem, item));
        activityList.appendChild(card);
      });
    }

    function generatedIntro(dayItem, item) {
      const place = item.place || dayItem.city;
      const libraryHit = introLibrary.find(([key]) => `${item.title} ${item.place} ${dayItem.city}`.includes(key));
      const isCity = item.type === "城市" || /城市|游玩|逛|半日游|市区|瀑布|博物馆|农场|剧场|国家公园|方舟|市场|Outlet/i.test(item.title);
      const textFromLibrary = libraryHit ? libraryHit[1] : "";
      const opener = isCity
        ? `${place} 可以当作这天行程的背景来理解：它不只是一个打卡点，更是当天节奏的锚点。`
        : `${item.title} 是 ${dayItem.date} 的关键安排，适合提前知道它的目的、节奏和注意事项。`;
      const body = textFromLibrary || `${opener} 建议把它当作轻量安排：先保证集合和交通顺畅，再按体力决定停留时间。`;
      const tips = [
        `地点关键词：${place}`,
        `建议重点：${item.details[0] || item.intro}`
      ];
      return { title: `${item.title}介绍`, text: body, tips };
    }

    function openDetail(dayItem, item) {
      document.querySelector("#modalMeta").textContent = `${dayItem.date} ${dayItem.weekday} · ${item.time} · ${item.type}`;
      document.querySelector("#modalTitle").textContent = item.title;
      document.querySelector("#modalIntro").textContent = item.intro;
      document.querySelector("#modalDetails").innerHTML = item.details.map(detail => `<li>${detail}</li>`).join("");
      const maps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.place || dayItem.city)}`;
      document.querySelector("#modalLinks").innerHTML = `
        <a class="nav-button" href="${maps}" target="_blank" rel="noreferrer">打开地图</a>
        <button class="nav-button" type="button" id="showIntroBtn">查看介绍</button>
      `;
      document.querySelector("#showIntroBtn").addEventListener("click", () => openGeneratedIntro(dayItem, item));
      detailDialog.showModal();
    }

    function openGeneratedIntro(dayItem, item) {
      const intro = generatedIntro(dayItem, item);
      document.querySelector("#introTitle").textContent = intro.title;
      document.querySelector("#introText").textContent = intro.text;
      document.querySelector("#introTips").innerHTML = intro.tips.map(tip => `<li>${tip}</li>`).join("");
      if (detailDialog.open) detailDialog.close();
      introDialog.showModal();
    }

    function render() {
      renderDates();
      renderDay();
    }

    searchInput.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    document.querySelector("#clearBtn").addEventListener("click", () => {
      searchInput.value = "";
      state.query = "";
      state.selectedId = "2026-05-25";
      render();
    });

    document.querySelector("#mainDayBtn").addEventListener("click", () => {
      searchInput.value = "";
      state.query = "";
      state.selectedId = "2026-05-25";
      render();
    });

    document.querySelector("#printBtn").addEventListener("click", () => window.print());
    document.querySelector("#closeDialog").addEventListener("click", () => detailDialog.close());
    document.querySelector("#closeIntro").addEventListener("click", () => introDialog.close());
    detailDialog.addEventListener("click", event => { if (event.target === detailDialog) detailDialog.close(); });
    introDialog.addEventListener("click", event => { if (event.target === introDialog) introDialog.close(); });

    render();
  </script>
</body>
</html>
