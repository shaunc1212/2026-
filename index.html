<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>美国之行 2026 行程</title>
  <meta name="description" content="2026 年 5 月 19 日至 6 月 10 日美国家庭行程交互系统">
  <style>
    :root {
      color-scheme: light;
      --ink: #18202a;
      --muted: #5f6975;
      --line: #d9e1e8;
      --paper: #fbfcfd;
      --panel: #ffffff;
      --blue: #2864a6;
      --blue-dark: #17436f;
      --green: #2c7a5b;
      --yellow: #f2c14e;
      --rose: #c75252;
      --shadow: 0 14px 35px rgba(22, 36, 54, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.55;
    }

    button, input {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 252, 253, .94);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 31px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-button, .pill-button, .date-button, .activity-card, .nav-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .icon-button:hover, .pill-button:hover, .date-button:hover, .activity-card:hover, .nav-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(22, 36, 54, .09);
      border-color: #aec0d0;
    }

    .hero {
      background:
        linear-gradient(110deg, rgba(24, 32, 42, .86), rgba(24, 32, 42, .46)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80") center/cover;
      min-height: 260px;
      color: #fff;
      display: flex;
      align-items: flex-end;
    }

    .hero-inner {
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 58px 18px 34px;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: .98;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 720px;
      margin: 16px 0 0;
      font-size: clamp(16px, 2vw, 21px);
      color: rgba(255, 255, 255, .9);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 18px 54px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .search {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      background: #fff;
      color: var(--ink);
      width: 100%;
    }

    .pill-button {
      min-height: 48px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .date-panel {
      position: sticky;
      top: 86px;
      display: grid;
      gap: 10px;
    }

    .date-button {
      border-radius: 8px;
      min-height: 72px;
      padding: 10px 12px;
      text-align: left;
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 12px;
      align-items: center;
    }

    .date-button.active {
      background: #e8f2fd;
      border-color: var(--blue);
      box-shadow: inset 4px 0 0 var(--blue);
    }

    .date-num {
      font-size: 24px;
      font-weight: 800;
      color: var(--blue-dark);
    }

    .date-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .date-title {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .content-panel {
      min-width: 0;
    }

    .day-header {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .day-header h3 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .day-header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 17px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 14px 0 20px;
    }

    .info-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      min-height: 92px;
    }

    .info-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .info-value {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .activity-list {
      display: grid;
      gap: 12px;
    }

    .activity-card {
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      width: 100%;
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .activity-time {
      color: var(--blue-dark);
      font-weight: 800;
      white-space: normal;
    }

    .activity-card h4 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .activity-card p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .activity-type {
      padding: 6px 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      background: var(--green);
      white-space: nowrap;
    }

    .activity-type.traffic { background: var(--blue); }
    .activity-type.food { background: var(--rose); }
    .activity-type.hotel { background: #725a9c; }

    .empty {
      padding: 22px;
      border: 1px dashed #b8c4cf;
      border-radius: 8px;
      color: var(--muted);
      background: #fff;
    }

    dialog {
      border: 0;
      padding: 0;
      border-radius: 8px;
      width: min(680px, calc(100vw - 28px));
      box-shadow: 0 24px 70px rgba(11, 19, 30, .32);
    }

    dialog::backdrop {
      background: rgba(8, 14, 22, .54);
    }

    .modal {
      background: #fff;
      color: var(--ink);
    }

    .modal-head {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: start;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 27px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .modal-body {
      padding: 18px 20px 20px;
    }

    .modal-body p {
      margin: 0 0 14px;
      font-size: 17px;
    }

    .detail-list {
      margin: 0;
      padding-left: 20px;
    }

    .detail-list li {
      margin: 8px 0;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .nav-button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      border-radius: 8px;
      padding: 0 12px;
      color: var(--blue-dark);
      text-decoration: none;
      font-weight: 800;
    }

    .close {
      flex: 0 0 auto;
    }

    .print-note {
      display: none;
    }

    @media (max-width: 860px) {
      .topbar-inner {
        align-items: flex-start;
      }

      .quick-actions {
        display: none;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .date-panel {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .date-button {
        grid-template-columns: 1fr;
        min-height: 92px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .activity-card {
        grid-template-columns: 1fr;
      }

      .activity-type {
        width: fit-content;
      }
    }

    @media (max-width: 520px) {
      .hero {
        min-height: 220px;
      }

      .brand p {
        display: none;
      }

      .date-panel {
        grid-template-columns: 1fr;
      }

      .day-header, .activity-card, .info-box {
        padding: 14px;
      }
    }

    @media print {
      .topbar, .toolbar, .date-panel, dialog {
        display: none !important;
      }

      .hero {
        background: none;
        color: #000;
        min-height: auto;
      }

      .layout {
        display: block;
      }

      .day-header, .activity-card, .info-box {
        box-shadow: none;
        break-inside: avoid;
      }

      .print-note {
        display: block;
        margin: 0 0 16px;
      }
    }
  </style>
</head>

    function activity(time, title, type, intro, details, place) {
      return { time, title, type, intro, details, place };
    }

    const typeClass = {
      "交通": "traffic",
      "用餐": "food",
      "酒店": "hotel",
      "城市": "",
      "活动": "",
      "准备": "",
      "购物": "food"
    };

    const state = {
      selectedId: "2026-05-25",
      query: ""
    };

    const datePanel = document.getElementById("datePanel");
    const dayHeader = document.getElementById("dayHeader");
    const infoGrid = document.getElementById("infoGrid");
    const activityList = document.getElementById("activityList");
    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const todayBtn = document.getElementById("todayBtn");
    const printBtn = document.getElementById("printBtn");
    const dialog = document.getElementById("detailDialog");
    const closeDialog = document.getElementById("closeDialog");

    function normalize(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "");
    }

    function matchesDay(day, query) {
      if (!query) return true;
      const haystack = normalize([
        day.date,
        day.weekday,
        day.title,
        day.city,
        day.lodging,
        day.summary,
        ...day.activities.flatMap(item => [item.time, item.title, item.type, item.intro, item.place, ...item.details])
      ].join(" "));
      return haystack.includes(normalize(query));
    }

    function filteredTrip() {
      return trip.filter(day => matchesDay(day, state.query));
    }

    function renderDates() {
      const days = filteredTrip();
      datePanel.innerHTML = "";
      if (!days.some(day => day.id === state.selectedId) && days.length) {
        state.selectedId = days[0].id;
      }

      days.forEach(day => {
        const button = document.createElement("button");
        button.className = "date-button" + (day.id === state.selectedId ? " active" : "");
        button.type = "button";
        button.innerHTML = `
          <div>
            <div class="date-num">${day.date}</div>
            <div class="date-meta">${day.weekday}</div>
          </div>
          <div>
            <div class="date-title">${day.title}</div>
            <div class="date-meta">${day.city}</div>
          </div>
        `;
        button.addEventListener("click", () => {
          state.selectedId = day.id;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        datePanel.appendChild(button);
      });

      if (!days.length) {
        datePanel.innerHTML = `<div class="empty">没有找到相关日期，请换一个关键词。</div>`;
      }
    }

    function renderDay() {
      const day = trip.find(item => item.id === state.selectedId) || filteredTrip()[0];
      if (!day) {
        dayHeader.innerHTML = `<h3>没有找到行程</h3><p>请清空搜索后再试。</p>`;
        infoGrid.innerHTML = "";
        activityList.innerHTML = "";
        return;
      }

      dayHeader.innerHTML = `
        <h3>${day.date} ${day.title}</h3>
        <p>${day.summary}</p>
      `;

      infoGrid.innerHTML = [
        ["城市", day.city],
        ["住宿", day.lodging],
        ["活动数", `${day.activities.length} 项`]
      ].map(([label, value]) => `
        <div class="info-box">
          <div class="info-label">${label}</div>
          <div class="info-value">${value}</div>
        </div>
      `).join("");

      activityList.innerHTML = "";
      day.activities.forEach((item, index) => {
        const card = document.createElement("button");
        const cls = typeClass[item.type] || "";
        card.className = "activity-card";
        card.type = "button";
        card.innerHTML = `
          <div class="activity-time">${item.time}</div>
          <div>
            <h4>${item.title}</h4>
            <p>${item.intro}</p>
          </div>
          <div class="activity-type ${cls}">${item.type}</div>
        `;
        card.addEventListener("click", () => openDetail(day, item, index));
        activityList.appendChild(card);
      });
    }

    function openDetail(day, item) {
      document.getElementById("modalMeta").textContent = `${day.date} ${day.weekday} · ${item.time} · ${item.type}`;
      document.getElementById("modalTitle").textContent = item.title;
      document.getElementById("modalIntro").textContent = item.intro;
      document.getElementById("modalDetails").innerHTML = item.details.map(detail => `<li>${detail}</li>`).join("");

      const links = document.getElementById("modalLinks");
      const maps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.place || day.city)}`;
      const search = `https://www.google.com/search?q=${encodeURIComponent(item.title + " " + (item.place || day.city))}`;
      links.innerHTML = `
        <a class="nav-button" href="${maps}" target="_blank" rel="noreferrer">打开地图</a>
        <a class="nav-button" href="${search}" target="_blank" rel="noreferrer">查看介绍</a>
      `;

      if (typeof dialog.showModal === "function") {
        dialog.showModal();
      } else {
        alert(`${item.title}\n\n${item.intro}\n\n${item.details.join("\n")}`);
      }
    }

    function render() {
      renderDates();
      renderDay();
    }

    searchInput.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      state.query = "";
      state.selectedId = "2026-05-25";
      render();
    });

    todayBtn.addEventListener("click", () => {
      state.selectedId = "2026-05-25";
      state.query = "";
      searchInput.value = "";
      render();
    });

    printBtn.addEventListener("click", () => window.print());
    closeDialog.addEventListener("click", () => dialog.close());
    dialog.addEventListener("click", event => {
      if (event.target === dialog) dialog.close();
    });

    render();
  </script>
